name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for Vem packages
        run: |
          CORE_VERSION=$(node -p "require('./package.json').dependencies['@vemjs/core'].replace(/^[^0-9]*/, '')")
          PLUGIN_API_VERSION=$(node -p "require('./package.json').dependencies['@vemjs/plugin-api'].replace(/^[^0-9]*/, '')")
          RENDERER_VERSION=$(node -p "require('./package.json').dependencies['@vemjs/renderer-vecto'].replace(/^[^0-9]*/, '')")
          for i in {1..30}; do
            if npm view "@vemjs/core@$CORE_VERSION" version >/dev/null 2>&1 && npm view "@vemjs/plugin-api@$PLUGIN_API_VERSION" version >/dev/null 2>&1 && npm view "@vemjs/renderer-vecto@$RENDERER_VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for @vemjs/core@$CORE_VERSION, @vemjs/plugin-api@$PLUGIN_API_VERSION, and @vemjs/renderer-vecto@$RENDERER_VERSION to be available on npm" >&2
          exit 1

      - name: Install dependencies
        run: bun install

      - name: Lint (Oxlint)
        run: bun run lint

      - name: Check code format (Prettier)
        run: bun run format:check

      - name: Test
        run: bun test src

      - name: Build website
        run: bun run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=vem --branch=main --commit-dirty=true
