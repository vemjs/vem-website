<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Space Diamond Background -->
    <linearGradient id="bgGrad" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    
    <!-- Left Arm (Shadow/Darker Green) -->
    <linearGradient id="leftArmGrad" x1="20" y1="25" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16a34a" />
      <stop offset="1" stop-color="#064e3b" />
    </linearGradient>

    <!-- Right Arm (Lit/Neon Green) -->
    <linearGradient id="rightArmGrad" x1="80" y1="25" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80" />
      <stop offset="1" stop-color="#15803d" />
    </linearGradient>

    <!-- Drop Shadow for the floating V -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Base Diamond -->
  <path d="M50 5 L95 50 L50 95 L5 50 Z" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="bevel" />
  
  <!-- Subtle Blueprint Diamond Inner Border -->
  <path d="M50 12 L88 50 L50 88 L12 50 Z" stroke="#334155" stroke-width="0.3" stroke-linejoin="bevel" />

  <!-- The Sharp, Folded V (Split into two 3D faces) -->
  <g filter="url(#shadow)">
    <!-- Left Arm (Thin, Shadowed) -->
    <path d="M 20 25 L 50 80 L 47.5 57.1 L 30 25 Z" fill="url(#leftArmGrad)" />
    <!-- Right Arm (Thick, Lit) -->
    <path d="M 47.5 57.1 L 50 80 L 80 25 L 65 25 Z" fill="url(#rightArmGrad)" />
  </g>

  <!-- Sharp edge highlight on the folding seam (from crotch to apex) -->
  <line x1="47.5" y1="57.1" x2="50" y2="80" stroke="#86efac" stroke-width="0.5" opacity="0.6" />

  <!-- Technical Vector Nodes (Precision Crosshairs instead of childish circles) -->
  <g stroke="#ffffff" stroke-width="0.6" fill="#020617">
    <!-- Top Left Node -->
    <circle cx="20" cy="25" r="1.5" />
    <!-- Bottom Apex Node -->
    <circle cx="50" cy="80" r="1.5" />
    <!-- Top Right Node -->
    <circle cx="80" cy="25" r="1.5" />
  </g>
  
</svg>
